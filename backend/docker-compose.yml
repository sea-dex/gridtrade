# ──────────────────────────────────────────────────────────────
# GridEx Backend – Docker Compose
# ──────────────────────────────────────────────────────────────
# Usage:
#   docker compose up -d --build
#   docker compose logs -f backend
#   docker compose down
# ──────────────────────────────────────────────────────────────

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      network: host

    container_name: gridex-backend
    restart: unless-stopped
    expose:
      - "5000"
    volumes:
      # Mount env file (read-only) – secrets stay on the host, never in the image
      - ./.env.production.local:/app/gridtrade/backend/.env.production.local:ro
      # Persist logs in a Docker-managed volume to avoid host filesystem permission issues
      - backend_logs:/app/gridtrade/backend/logs
    environment:
      - NODE_ENV=production
      - PORT=5000
      - TZ=Asia/Shanghai
    # Allow the container to reach services on the host via host.docker.internal
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  backend_logs:
