# ──────────────────────────────────────────────────────────────
# GridEx Backend – Docker Compose
# ──────────────────────────────────────────────────────────────
# Usage:
#   docker compose up -d --build
#   docker compose logs -f backend
#   docker compose down
# ──────────────────────────────────────────────────────────────

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      network: host

    container_name: gridex-backend
    restart: unless-stopped
    expose:
      - "5000"
    volumes:
      # Mount env file from a stable host path.
      - /app/gridtrade/backend/.env.production.local:/app/.env.production.local:ro
      # Persist logs under the unified host path.
      - /app/gridtrade/backend/logs:/app/logs
    environment:
      - NODE_ENV=production
      - PORT=5000
      - TZ=Asia/Shanghai
    # Allow the container to reach services on the host via host.docker.internal
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:5000/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
